<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Assalam TV</title>

<style>
.glow{
animation:glowPulse 2s infinite;
border:2px solid gold !important;
}
body{
margin:0;
background:#050505;
color:white;
font-family:Arial;
overflow:hidden;
}

/* HEADER */
.header{
height:150px;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 30px;
border-bottom:3px solid gold;
}

.logo{width:130px;border-radius:50%;border:3px solid gold;}
.logo2{width:130px;border-radius:10px;border:2px solid gold;filter:brightness(1.3);}

.ar{color:#FFD700;}
.de{color:#fff;}

.bismillah{text-align:center;}
.bismillah .ar{font-size:60px;}
.bismillah .de{font-size:18px;color:#bbb;}

/* GRID */
.container{
display:grid;
grid-template-columns: 26% 48% 26%;
gap:16px;
padding:16px;
height:calc(100vh - 220px - 70px);
margin-bottom:6px;
}

/* BOX */
.box{
border:2px solid gold;
border-radius:12px;
background:#000;
padding:12px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.title{
text-align:center;
background:#111;
padding:6px;
border-radius:6px;
margin-bottom:8px;
}
.title .ar{font-size:22px;}
.title .de{font-size:16px;}

.leftCol{display:flex;flex-direction:column;gap:12px;}
#clock{font-size:60px;text-align:center;}

.big{font-size:34px;}
.mid{font-size:24px;}
.small{font-size:20px;color:#bbb;}

/* COUNTDOWN */
#countBox{
flex:1;
text-align:center;
background:url("Moschea.jpg") center/cover no-repeat;
position:relative;
display:flex;
flex-direction:column;
justify-content:center;
transition: all 0.5s ease;
}
#countBox::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.3);
}
#countBox *{position:relative;z-index:2;}

#nextPrayer{font-size:46px;}
#countdown{font-size:80px;}
#iqama{font-size:30px;color:#00ffaa;}

/* CENTER */
.centerCol{display:flex;flex-direction:column;}
.prayerGrid{flex:1;display:flex;flex-direction:column;gap:8px;}

.prayerItem{
flex:1;
display:flex;
justify-content:space-between;
align-items:center;
font-size:30px;
padding:8px;
border-radius:8px;
background:#111;
}

.active{
background:rgba(255,215,0,0.2);
color:#FFD700;
}

/* RIGHT */
.rightCol{display:flex;flex-direction:column;}

#hadithBox{
flex:1;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.hadithTop{
flex:2;
color:#FFD700;
font-size:32px;
text-align:center;
display:flex;
align-items:center;
justify-content:center;
}

.hadithBottom{
flex:2;
color:#fff;
font-size:24px;
text-align:center;
display:flex;
align-items:center;
justify-content:center;
}

.hadithInfo{
flex:0.6;
font-size:18px;
color:#00ffaa;
text-align:center;
border-top:2px solid gold;
margin-top:6px;
padding-top:6px;
background:#111;
border-radius:6px;
}

.divider{
height:2px;
background:linear-gradient(to right, transparent, gold, transparent);
margin:6px 0;
}

/* SCROLL */
#scrollBox{
position:fixed;
bottom:0;
width:100%;
height:70px;
display:flex;
border-top:3px solid gold;
background:black;
}

#scrollTitle{
color:#FFD700;
padding:10px;
font-size:26px;
}

#ticker{
overflow:hidden;
white-space:nowrap;
flex:1;
font-size:34px;
}

#ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 60s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

@keyframes glowPulse{
0%{box-shadow:0 0 10px rgba(255,215,0,0.3);}
50%{box-shadow:0 0 35px rgba(255,215,0,0.8);}
100%{box-shadow:0 0 10px rgba(255,215,0,0.3);}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

<div style="display:flex;align-items:center;gap:15px;">
<img src="LogoAssalam.jpg" class="logo">
<div>
<div class="ar">جمعية السلام غورليتز</div>
<div class="de">Assalam Görlitzer Verein</div>
</div>
</div>

<div class="bismillah">
<div class="ar">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
<div class="de">Im Namen Allahs, des Allerbarmers, des Barmherzigen</div>
</div>

<div style="display:flex;align-items:center;gap:10px;">
<div class="ar">لا تنسونا من دعائكم</div>
<img src="LogoApk.png" class="logo2">
</div>

</div>

<!-- GRID -->
<div class="container">

<!-- LEFT -->
<div class="leftCol">

<div class="box">
<div class="title"><div class="ar">الوقت</div><div class="de">Uhrzeit</div></div>
<div id="clock"></div>
</div>

<div class="box">
<div class="title"><div class="ar">التاريخ</div><div class="de">Datum</div></div>

<div style="display:flex;justify-content:space-between;">
<div>
<div id="dayNameDe" class="big de"></div>
<div id="dateNormal" class="mid de"></div>
</div>

<div style="text-align:right;">
<div id="dayNameAr" class="big ar"></div>
<div id="dateHijri" class="mid ar"></div>
</div>
</div>

</div>

<div class="box" id="countBox">
<div class="title"><div class="ar">الصلاة القادمة</div><div class="de">Nächstes Gebet</div></div>
<div id="nextPrayer"></div>
<div id="countdown"></div>
<div id="iqama"></div>
</div>

</div>

<!-- CENTER -->
<div class="centerCol">
<div class="box" style="flex:1;">
<div class="title"><div class="ar">أوقات الصلاة</div><div class="de">Gebetszeiten</div></div>
<div class="prayerGrid" id="table"></div>
</div>
</div>

<!-- RIGHT -->
<div class="rightCol">

<div class="box" id="hadithBox">
<div class="title">
<div class="ar">حديث / آية</div>
<div class="de">Hadith / Vers</div>
</div>

<div id="hadithAr" class="hadithTop"></div>
<div class="divider"></div>
<div id="hadithDe" class="hadithBottom"></div>
<div id="hadithInfo" class="hadithInfo"></div>

</div>

</div>

</div>

<!-- SCROLL -->
<div id="scrollBox">
<div id="scrollTitle">📢 Announcements</div>
<div id="ticker"><span id="tickerText"></span></div>
</div>

<script>
  let duaList=[];
let duaIndex=0;

fetch("dua.json").then(r=>r.json()).then(d=>duaList=d);  

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString("de-DE");
},1000);

/* TIMES */
let todayTimes=null;

fetch("times_2026_gorlitz_FINAL.json")
.then(r=>r.json())
.then(data=>{
todayTimes=data.find(x=>x.Date===new Date().toISOString().slice(0,10));
updateDate();
});

/* DATE */
function updateDate(){

let d=new Date();

let daysAr=["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
let daysDe=["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];

let i=d.getDay();

dayNameAr.innerText=daysAr[i];
dayNameDe.innerText=daysDe[i];
dateNormal.innerText=d.toLocaleDateString("de-DE");

/* ✅ HIJRI FORMATO NUOVO */
if(todayTimes && todayTimes.Hijri){

let p = todayTimes.Hijri.split("-");

let day = p[0];
let monthNum = parseInt(p[1]);
let year = p[2];

let months=[
"محرم","صفر","ربيع الأول","ربيع الثاني",
"جمادى الأولى","جمادى الآخرة","رجب","شعبان",
"رمضان","شوال","ذو القعدة","ذو الحجة"
];

let monthName = months[monthNum-1];

dateHijri.innerText = year+" "+monthName+"  "+day;

}

}

/* PRAYER */
function toDate(t){
let [h,m]=t.split(":");
let d=new Date();
d.setHours(h,m,0);
return d;
}

setInterval(()=>{

if(!todayTimes)return;

let now=new Date();
let prayers=["Fajr","Dhuhr","Asr","Maghrib","Isha"];
let next=null;

for(let p of prayers){
let t=toDate(todayTimes[p]);

/* ✅ PRENDE ANCHE LA SALAT APPENA INIZIATA */
if(t > now || Math.abs(now - t) < 60000){
next={name:p,time:t};
break;
}
}

if(!next) next={name:"Fajr",time:toDate(todayTimes.Fajr)};

/* IQAMA TIME */
let iqamaMin = (next.name==="Isha") ? 10 : 20;
let iqamaTime = new Date(next.time.getTime() + iqamaMin*60000);

let diffAdhan = (next.time - now) / 1000;
let diffAfterAdhan = -diffAdhan; // tempo dopo adhan
let inSequence = false;

let adhanDuration = 60;
let iqamaDuration = iqamaMin * 60;
let iqamaPhase = adhanDuration + iqamaDuration;
let salatDuration = 180;
let duaDuration = 300;

/* ================= SEQUENZA MOSCHEA ================= */

if(diffAdhan <= 0){
  inSequence = true;

/* DOPO ADHAN */
let t = diffAfterAdhan;

/* ADHAN */
if(t <= adhanDuration){

nextPrayer.innerHTML="🕌 الأذان<br>Adhan";
countdown.innerText = (adhanDuration - t).toString().padStart(2,"0");
iqama.innerText="";
countBox.classList.remove("glow");

/* IQAMA COUNTDOWN */
}else if(t <= iqamaPhase){

let remain = iqamaPhase - t;

nextPrayer.innerHTML="⏳ الإقامة<br>bis zur Iqama";
countdown.innerText = new Date(remain*1000).toISOString().substr(14,5);
iqama.innerText="";
countBox.classList.add("glow");

/* IQAMA */
}else if(t <= iqamaPhase + 60){

nextPrayer.innerHTML="📢 إقامة الصلاة<br>Iqama";
countdown.innerText="01:00";
iqama.innerText="📵 Bitte Handy ausschalten";

/* SALAT */
}else if(t <= iqamaPhase + 60 + salatDuration){

nextPrayer.innerHTML="🕌 الصلاة<br>As-Salat";
countdown.innerText="03:00";
iqama.innerText="";

/* DUAA */
}else if(t <= iqamaPhase + 60 + salatDuration + duaDuration){

if(duaList.length){

let d = duaList[duaIndex % duaList.length];

nextPrayer.innerHTML =
"🤲 الدعاء<br>"+d.ar+
"<br><span style='font-size:20px;color:white'>"+d.de+"</span>";

if(Math.floor(Date.now()/8000) % duaList.length !== duaIndex){
duaIndex++;
}

}

countdown.innerText="05:00";
iqama.innerText="";

}else{

/* torna normale */
nextPrayer.innerText=next.name;

let diff=(next.time-now)/1000;
countdown.innerText=new Date(diff*1000).toISOString().substr(11,8);
iqama.innerText="";
}

}
/* ================= NORMALE ================= */



if(!inSequence){

nextPrayer.innerText=next.name;

let diff=(next.time-now)/1000;
if(diff < 0) diff = 0;

countdown.innerText=new Date(diff*1000).toISOString().substr(11,8);

if(diff < 600){
countBox.classList.add("glow");
}else{
countBox.classList.remove("glow");
}

iqama.innerText="";

}


/* 🕌 TABLE CON SALAT ATTUALE */
let icons={Fajr:"🌅",Dhuhr:"☀️",Asr:"🌤",Maghrib:"🌇",Isha:"🌙"};

let html="";
for(let p of prayers){

let names={
Fajr:{ar:"الفجر",de:"Fajr"},
Dhuhr:{ar:"الظهر",de:"Dhuhr"},
Asr:{ar:"العصر",de:"Asr"},
Maghrib:{ar:"المغرب",de:"Maghrib"},
Isha:{ar:"العشاء",de:"Isha"}
};

let tStart = toDate(todayTimes[p]);
let tEnd;

if(p !== "Isha"){
let nextIndex = prayers.indexOf(p)+1;
tEnd = toDate(todayTimes[prayers[nextIndex]]);
}else{
tEnd = new Date(tStart.getTime()+90*60000);
}

let activeClass = (now >= tStart && now < tEnd) ? "active" : "";

html+=`<div class="prayerItem ${activeClass}">
<div>
<span class="ar">${icons[p]} ${names[p].ar}</span><br>
<span class="de">${names[p].de}</span>
</div>
<div>${todayTimes[p]}</div>
</div>`;
}

table.innerHTML=html;

},1000);

/* HADITH (non toccato) */
let hadiths=[], ayas=[];
let i=0, showHadith=true;

fetch("Hadith.json").then(r=>r.json()).then(d=>hadiths=d);
fetch("aya.json").then(r=>r.json()).then(d=>ayas=d);

setInterval(()=>{

if(showHadith && hadiths.length){

let h=hadiths[i%hadiths.length];

hadithAr.innerText="قال رسول الله ﷺ\n\n"+h.ar;
hadithDe.innerText="Der Gesandte Allahs ﷺ sagte:\n\n"+h.de;
hadithInfo.innerText=h.source;

}else if(ayas.length){

let a=ayas[i%ayas.length];

hadithAr.innerText="بسم الله الرحمن الرحيم\n\n"+a.ar;
hadithDe.innerText="Im Namen Allahs\n\n"+a.de;
hadithInfo.innerText="Sura "+a.source;

}

showHadith=!showHadith;
i++;

},20000);

/* SCROLL */
fetch("avvisi.json").then(r=>r.json()).then(d=>{
tickerText.innerText=d.join(" ✦ ");
});


</script>

</body>
</html>
